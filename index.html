<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeFi CRM Pro — Koke</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gap: 14px; --r-md: 8px; --r-lg: 14px; --r-xl: 18px;
  --bg: #ffffff; --bg2: #f5f5f3; --bg3: #ebebea;
  --text: #1a1a18; --text2: #6b6b67; --text3: #9e9e9a;
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
  --success: #0f6e56; --success-bg: #e1f5ee;
  --warning: #854f0b; --warning-bg: #faeeda;
  --danger: #a32d2d; --danger-bg: #fcebeb;
  --info: #185fa5; --info-bg: #e6f1fb;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --bg2: #272725; --bg3: #313130;
    --text: #e8e6de; --text2: #9e9c94; --text3: #6b6a64;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --success: #5dcaa5; --success-bg: #04342c;
    --warning: #ef9f27; --warning-bg: #412402;
    --danger: #f09595; --danger-bg: #501313;
    --info: #85b7eb; --info-bg: #042c53;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; background: var(--bg3); color: var(--text); min-height: 100vh; }
.app { max-width: 960px; margin: 0 auto; padding: 24px 20px; background: var(--bg); min-height: 100vh; }

.nav { display: flex; gap: 6px; padding: 10px 0 18px; border-bottom: 0.5px solid var(--border); margin-bottom: 22px; align-items: center; flex-wrap: wrap; }
.nav-btn { background: transparent; border: 0.5px solid transparent; border-radius: 8px; padding: 8px 18px; font-size: 14px; color: var(--text2); cursor: pointer; transition: all .15s; font-family: inherit; }
.nav-btn:hover { background: var(--bg2); color: var(--text); }
.nav-btn.active { background: var(--bg2); color: var(--text); border-color: var(--border2); font-weight: 500; }
.nav-sep { width: 0.5px; height: 20px; background: var(--border); margin: 0 4px; }
.btn-new { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 8px; padding: 8px 18px; font-size: 14px; font-family: inherit; color: var(--text); cursor: pointer; margin-left: auto; font-weight: 500; }

.view { display: none; }
.view.active { display: block; }

.metric-grid { display: grid; gap: 14px; margin-bottom: 22px; }
.metric-card { background: var(--bg2); border-radius: 8px; padding: 16px 18px; }
.metric-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; }
.metric-value { font-size: 22px; font-weight: 500; }
.metric-value.positive { color: var(--success); }
.metric-value.negative { color: var(--danger); }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

.wallet-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.wallet-tab { flex: 1; padding: 12px 16px; border-radius: 14px; border: 0.5px solid var(--border); background: var(--bg); cursor: pointer; transition: all .15s; font-family: inherit; text-align: left; }
.wallet-tab.active { border-width: 2px; }
.wallet-tab-total { font-size: 18px; font-weight: 500; margin-top: 6px; }
.wtag { font-size: 11px; padding: 2px 7px; border-radius: 99px; }
.tag-solo { background: var(--info-bg); color: var(--info); }
.tag-shared { background: var(--warning-bg); color: var(--warning); }

.donuts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 22px; }
.donut-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: 14px; padding: 18px; }
.donut-card-title { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; }
.donut-inner { display: flex; gap: 16px; align-items: center; }
.donut-wrap { position: relative; flex-shrink: 0; }
.donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; width: 80px; }
.donut-center-val { font-size: 13px; font-weight: 500; line-height: 1.2; }
.donut-center-lbl { font-size: 10px; color: var(--text3); margin-top: 2px; }
.donut-legend { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 0; }
.legend-row { display: flex; align-items: center; gap: 7px; font-size: 12px; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.legend-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.legend-pct { color: var(--text2); font-weight: 500; min-width: 38px; text-align: right; font-size: 11px; }
.legend-sep { height: 0.5px; background: var(--border); margin: 4px 0; }

.asset-table { width: 100%; border-collapse: collapse; }
.asset-table th { font-size: 12px; color: var(--text3); font-weight: 400; padding: 0 10px 10px; text-align: left; border-bottom: 0.5px solid var(--border); }
.asset-table td { font-size: 13px; padding: 11px 10px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
.asset-table tr:last-child td { border-bottom: none; }
.asset-sym { font-size: 14px; font-weight: 500; }
.asset-name-s { font-size: 11px; color: var(--text3); }
.pnl-pos { color: var(--success); }
.pnl-neg { color: var(--danger); }
.seg-mini { display: flex; height: 4px; border-radius: 99px; overflow: hidden; gap: 1px; width: 56px; }

.pos-list { display: flex; flex-direction: column; gap: 12px; }
.pos-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: 14px; padding: 20px 22px; cursor: pointer; transition: border-color .15s; }
.pos-card:hover { border-color: var(--border2); }
.pos-card.is-active { border-left: 4px solid var(--success); }
.pos-card.is-closed { border-left: 4px solid var(--border); opacity: .82; }
.pos-card.is-pending { border-left: 4px solid var(--warning); }
.pos-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.badge { font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 99px; }
.badge-active { background: var(--success-bg); color: var(--success); }
.badge-closed { background: var(--bg2); color: var(--text2); }
.badge-pending { background: var(--warning-bg); color: var(--warning); }
.pos-pair { font-size: 17px; font-weight: 500; flex: 1; }
.pos-proto { font-size: 13px; color: var(--text2); }
.wtag-inline { font-size: 12px; padding: 3px 10px; border-radius: 99px; display: flex; align-items: center; gap: 5px; }
.pos-stats { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; }
.stat-label { font-size: 12px; color: var(--text3); margin-bottom: 3px; }
.stat-value { font-size: 14px; font-weight: 500; }
.stat-value.pos { color: var(--success); }
.stat-value.neg { color: var(--danger); }

.wallet-filter { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.wallet-pill { display: flex; align-items: center; gap: 7px; padding: 7px 14px; border-radius: 99px; border: 0.5px solid var(--border2); background: var(--bg); font-size: 13px; cursor: pointer; font-family: inherit; color: var(--text2); transition: all .15s; }
.wallet-pill.active { background: var(--bg2); color: var(--text); border-color: var(--border2); font-weight: 500; }
.wallet-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

.detail-back { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text2); cursor: pointer; margin-bottom: 22px; background: none; border: none; font-family: inherit; padding: 0; }
.detail-back:hover { color: var(--text); }
.detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 22px; gap: 12px; }
.detail-pair { font-size: 26px; font-weight: 500; }
.detail-meta { font-size: 14px; color: var(--text2); margin-top: 5px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.sec-title { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; margin-top: 24px; }
.sec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; margin-top: 24px; }
.sec-header .sec-title { margin: 0; }
.detail-grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; margin-bottom: 16px; }
.dc { background: var(--bg2); border-radius: 8px; padding: 14px 16px; }
.dc-label { font-size: 12px; color: var(--text3); margin-bottom: 5px; }
.dc-value { font-size: 18px; font-weight: 500; }
.token-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
.token-row:last-child { border-bottom: none; }
.tok-sym { font-size: 14px; font-weight: 500; min-width: 70px; }
.tok-detail { flex: 1; font-size: 13px; color: var(--text2); }
.tok-usd { font-size: 14px; font-weight: 500; text-align: right; }
.tok-pct { font-size: 12px; color: var(--text3); text-align: right; }
.rewards-table { width: 100%; border-collapse: collapse; }
.rewards-table th { font-size: 12px; color: var(--text3); font-weight: 400; padding: 0 6px 10px; text-align: left; }
.rewards-table td { font-size: 14px; padding: 10px 6px; border-top: 0.5px solid var(--border); vertical-align: middle; }
.rs { font-size: 12px; padding: 3px 10px; border-radius: 99px; }
.rs-reinv { background: var(--info-bg); color: var(--info); }
.rs-ret { background: var(--success-bg); color: var(--success); }
.rs-pend { background: var(--warning-bg); color: var(--warning); }
.breakdown-bar { display: flex; height: 10px; border-radius: 99px; overflow: hidden; gap: 2px; margin: 10px 0 8px; }
.bar-seg { height: 100%; border-radius: 2px; }
.bleg { display: flex; gap: 18px; flex-wrap: wrap; }
.bleg-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); }
.bleg-dot { width: 9px; height: 9px; border-radius: 50%; }
.rebal-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
.rebal-row:last-child { border-bottom: none; }
.rebal-tok { font-size: 14px; font-weight: 500; min-width: 70px; }
.rebal-pcts { font-size: 13px; color: var(--text2); flex: 1; }
.rebal-action { font-size: 14px; font-weight: 500; }
.rebal-action.buy { color: var(--success); }
.rebal-action.sell { color: var(--danger); }
.rebal-action.ok { color: var(--text3); }
.action-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 28px; padding-top: 20px; border-top: 0.5px solid var(--border); }
.btn-act { border-radius: 8px; padding: 10px 18px; font-size: 14px; font-family: inherit; cursor: pointer; transition: all .15s; border: 0.5px solid; }
.btn-act-primary { background: var(--bg2); border-color: var(--border2); color: var(--text); font-weight: 500; }
.btn-act-ghost { background: transparent; border-color: var(--border2); color: var(--text2); }
.btn-act-ghost:hover { background: var(--bg2); color: var(--text); }
.btn-act-danger { background: transparent; border-color: transparent; color: var(--danger); font-size: 13px; margin-left: auto; }
.btn-act-danger:hover { border-color: var(--danger); background: var(--danger-bg); }
.action-hint { font-size: 12px; color: var(--text3); margin-top: 8px; }
.btn-sm { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 8px; padding: 6px 12px; font-size: 13px; font-family: inherit; color: var(--text); cursor: pointer; }
.btn-icon { background: transparent; border: none; cursor: pointer; color: var(--text3); font-size: 14px; padding: 3px 7px; border-radius: 4px; font-family: inherit; }
.btn-icon:hover { color: var(--danger); background: var(--danger-bg); }
.btn-icon-e { background: transparent; border: none; cursor: pointer; color: var(--text3); font-size: 14px; padding: 3px 7px; border-radius: 4px; font-family: inherit; }
.btn-icon-e:hover { color: var(--text); background: var(--bg2); }
.card-box { background: var(--bg); border: 0.5px solid var(--border); border-radius: 14px; padding: 18px 20px; }
.empty-state { text-align: center; padding: 48px 24px; color: var(--text3); font-size: 14px; line-height: 1.8; }

.modal-wrap { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; }
.modal-wrap.open { display: flex; }
.modal { background: var(--bg); border-radius: 18px; border: 0.5px solid var(--border2); padding: 28px; width: min(560px, 95vw); max-height: 88vh; overflow-y: auto; }
.modal-title { font-size: 18px; font-weight: 500; margin-bottom: 5px; }
.modal-desc { font-size: 13px; color: var(--text2); margin-bottom: 18px; }
.form-row { margin-bottom: 14px; }
.form-label { font-size: 13px; color: var(--text2); margin-bottom: 5px; display: block; }
.form-input { width: 100%; padding: 10px 12px; font-size: 14px; font-family: inherit; border: 0.5px solid var(--border2); border-radius: 8px; background: var(--bg2); color: var(--text); }
.form-input:focus { outline: none; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
.btn-cancel { background: none; border: 0.5px solid var(--border); border-radius: 8px; padding: 9px 16px; font-size: 14px; font-family: inherit; color: var(--text2); cursor: pointer; }
.btn-save { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 8px; padding: 9px 20px; font-size: 14px; font-family: inherit; color: var(--text); cursor: pointer; font-weight: 500; }
.btn-save-danger { background: var(--danger-bg); border: 0.5px solid var(--danger); border-radius: 8px; padding: 9px 16px; font-size: 14px; font-family: inherit; color: var(--danger); cursor: pointer; font-weight: 500; }
.confirm-box { background: var(--danger-bg); border: 0.5px solid var(--danger); border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; font-size: 14px; color: var(--danger); }
.form-sep { font-size: 12px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin: 16px 0 10px; padding-top: 14px; border-top: 0.5px solid var(--border); }
</style>
</head>
<body>
<div class="app">

<div class="nav">
  <button class="nav-btn" id="nav-portfolio" onclick="showView('portfolio')">Portfolio</button>
  <div class="nav-sep"></div>
  <button class="nav-btn active" id="nav-positions" onclick="showView('positions')">Pools DeFi</button>
  <button class="nav-btn" id="nav-global" onclick="showView('global')">Resumen</button>
  <button class="btn-new" id="nav-new" onclick="handleNew()">+ Nueva posición</button>
</div>

<div id="view-portfolio" class="view"><div id="portfolio-content"></div></div>
<div id="view-positions" class="view active">
  <div class="wallet-filter" id="wallet-filter"></div>
  <div id="pos-list" class="pos-list"></div>
</div>
<div id="view-detail" class="view">
  <button class="detail-back" onclick="backFromDetail()">← Volver</button>
  <div id="detail-content"></div>
</div>
<div id="view-global" class="view"><div id="global-content"></div></div>

</div>

<!-- MODAL ACTIVO -->
<div class="modal-wrap" id="modal-asset">
<div class="modal">
  <div class="modal-title" id="masset-title">Añadir activo</div>
  <div class="modal-desc">Define el activo, su wallet HODL, balance total y precios.</div>
  <div class="form-row"><label class="form-label">Wallet</label>
    <select class="form-input" id="a-wallet">
      <option value="koke">Koke (personal)</option>
      <option value="koke-belen">Koke + Belén (compartida)</option>
    </select>
  </div>
  <div class="form-grid">
    <div class="form-row"><label class="form-label">Símbolo</label><input class="form-input" id="a-symbol" placeholder="BTC, ETH..."></div>
    <div class="form-row"><label class="form-label">Nombre</label><input class="form-input" id="a-name" placeholder="Bitcoin..."></div>
    <div class="form-row"><label class="form-label">Cantidad total</label><input class="form-input" id="a-qty" type="number" placeholder="1"></div>
    <div class="form-row"><label class="form-label">Precio actual (USD)</label><input class="form-input" id="a-price" type="number" placeholder="95000"></div>
    <div class="form-row"><label class="form-label">Precio de compra (USD)</label><input class="form-input" id="a-buy-price" type="number" placeholder="60000"></div>
    <div class="form-row"><label class="form-label">Fecha de compra</label><input class="form-input" id="a-buy-date" type="date"></div>
  </div>
  <div class="form-actions">
    <button class="btn-cancel" onclick="document.getElementById('modal-asset').classList.remove('open')">Cancelar</button>
    <button class="btn-save" onclick="saveAsset()">Guardar</button>
  </div>
</div>
</div>

<!-- MODAL POSICIÓN -->
<div class="modal-wrap" id="modal-pos">
<div class="modal">
  <div class="modal-title" id="mpos-title">Nueva posición DeFi</div>
  <div class="modal-desc" id="mpos-desc"></div>
  <div class="form-row"><label class="form-label">Wallet</label>
    <select class="form-input" id="f-wallet">
      <option value="koke">Koke (personal)</option>
      <option value="koke-belen">Koke + Belén (compartida)</option>
    </select>
  </div>
  <div class="form-grid">
    <div class="form-row"><label class="form-label">Protocolo</label><input class="form-input" id="f-protocol" placeholder="Uniswap, Curve..."></div>
    <div class="form-row"><label class="form-label">Red</label><input class="form-input" id="f-network" placeholder="Arbitrum, Base..."></div>
    <div class="form-row"><label class="form-label">Token A</label><input class="form-input" id="f-ta-sym" placeholder="ETH"></div>
    <div class="form-row"><label class="form-label">Token B</label><input class="form-input" id="f-tb-sym" placeholder="USDC"></div>
    <div class="form-row"><label class="form-label">Cantidad Token A</label><input class="form-input" id="f-ta-qty" type="number"></div>
    <div class="form-row"><label class="form-label">Precio Token A (USD)</label><input class="form-input" id="f-ta-price" type="number"></div>
    <div class="form-row"><label class="form-label">Cantidad Token B</label><input class="form-input" id="f-tb-qty" type="number"></div>
    <div class="form-row"><label class="form-label">Precio Token B (USD)</label><input class="form-input" id="f-tb-price" type="number"></div>
  </div>
  <div class="form-row"><label class="form-label">Fecha entrada</label><input class="form-input" id="f-date-in" type="date"></div>
  <div id="f-track-section" style="display:none">
    <div class="form-sep">Seguimiento actual</div>
    <div class="form-grid">
      <div class="form-row"><label class="form-label">Valor actual (USD)</label><input class="form-input" id="f-cur-val" type="number"></div>
      <div class="form-row"><label class="form-label">Fees acumuladas (USD)</label><input class="form-input" id="f-fees" type="number"></div>
    </div>
  </div>
  <div class="form-actions">
    <button class="btn-cancel" onclick="document.getElementById('modal-pos').classList.remove('open')">Cancelar</button>
    <button class="btn-save" id="mpos-btn" onclick="savePos()">Guardar</button>
  </div>
</div>
</div>

<!-- MODAL CERRAR -->
<div class="modal-wrap" id="modal-close">
<div class="modal">
  <div class="modal-title">Cerrar posición</div>
  <div class="modal-desc">Los tokens retirados vuelven automáticamente a HODL de la misma wallet.</div>
  <div class="form-grid">
    <div class="form-row"><label class="form-label" id="cl-la">Token A retirado</label><input class="form-input" id="cl-ta-qty" type="number"></div>
    <div class="form-row"><label class="form-label" id="cl-lb">Token B retirado</label><input class="form-input" id="cl-tb-qty" type="number"></div>
    <div class="form-row"><label class="form-label" id="cl-pa">Precio Token A</label><input class="form-input" id="cl-ta-price" type="number"></div>
    <div class="form-row"><label class="form-label" id="cl-pb">Precio Token B</label><input class="form-input" id="cl-tb-price" type="number"></div>
    <div class="form-row"><label class="form-label">Fees acumuladas (USD)</label><input class="form-input" id="cl-fees" type="number" placeholder="0"></div>
    <div class="form-row"><label class="form-label">Fecha salida</label><input class="form-input" id="cl-date" type="date"></div>
  </div>
  <div class="form-actions">
    <button class="btn-cancel" onclick="document.getElementById('modal-close').classList.remove('open')">Cancelar</button>
    <button class="btn-save" onclick="saveClose()">Cerrar y guardar en historial</button>
  </div>
</div>
</div>

<!-- MODAL ELIMINAR -->
<div class="modal-wrap" id="modal-delete">
<div class="modal">
  <div class="modal-title">Eliminar posición</div>
  <div class="confirm-box">Acción irreversible. Desaparece completamente sin rastro.</div>
  <div class="form-actions">
    <button class="btn-cancel" onclick="document.getElementById('modal-delete').classList.remove('open')">Cancelar</button>
    <button class="btn-save-danger" onclick="confirmDelete()">Sí, eliminar definitivamente</button>
  </div>
</div>
</div>

<!-- MODAL REWARD -->
<div class="modal-wrap" id="modal-reward">
<div class="modal">
  <div class="modal-title" id="mrew-title">Registrar reward</div>
  <div class="form-row"><label class="form-label">Importe en USD</label><input class="form-input" id="r-usd" type="number" placeholder="50"></div>
  <div class="form-row"><label class="form-label">Fecha</label><input class="form-input" id="r-date" type="date"></div>
  <div class="form-row"><label class="form-label">Estado</label>
    <select class="form-input" id="r-state">
      <option value="reinvertido">Reinvertido en pool</option>
      <option value="retirado">Retirado a cartera</option>
      <option value="pendiente">Pendiente</option>
    </select>
  </div>
  <div class="form-actions">
    <button class="btn-cancel" onclick="document.getElementById('modal-reward').classList.remove('open')">Cancelar</button>
    <button class="btn-save" id="mrew-btn" onclick="saveReward()">Guardar</button>
  </div>
</div>
</div>

<script>
const KEY='defi_crm_v7';
const WALLETS={koke:{label:'Koke',type:'personal',color:'#378ADD'},'koke-belen':{label:'Koke + Belén',type:'compartida',color:'#BA7517'}};
const ASSET_COLORS=['#378ADD','#1D9E75','#D85A30','#533AB7','#BA7517','#993556','#3B6D11','#5F5E5A'];
function hodlColor(c){const m={'#378ADD':'#85B7EB','#1D9E75':'#5DCAA5','#D85A30':'#F0997B','#533AB7':'#AFA9EC','#BA7517':'#EF9F27','#993556':'#ED93B1','#3B6D11':'#97C459','#5F5E5A':'#B4B2A9'};return m[c]||c+'99';}

let db={assets:[],positions:[]};
let activeFilter='all',activeDetail=null,prevView='positions',editingPosId=null,editingAssetId=null,rewardTarget=null,closeTarget=null,deleteTarget=null,activeWalletTab='koke';

function load(){try{const r=localStorage.getItem(KEY);if(r)db=JSON.parse(r);}catch(e){}if(!db.assets)db.assets=[];if(!db.positions)db.positions=[];}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(db));}catch(e){}}

const cap=p=>p.taQty*p.taPrice+p.tbQty*p.tbPrice;
const rewTotal=p=>p.rewards.reduce((s,r)=>s+r.usd,0);
const exitVal=p=>p.exitTaQty?p.exitTaQty*p.exitTaPrice+p.exitTbQty*p.exitTbPrice:0;
function pnl(p){return p.status==='active'?(p.curVal+rewTotal(p))-cap(p):exitVal(p)+rewTotal(p)-cap(p);}
function roi(p){const c=cap(p);return c>0?pnl(p)/c*100:0;}
function days(p){const f=new Date(p.dateIn),t=p.dateOut?new Date(p.dateOut):new Date();return Math.max(1,Math.round((t-f)/86400000));}
function apy(p){const r=roi(p)/100,d=days(p);return(Math.pow(1+r,365/d)-1)*100;}
function il(p){if(!p.exitTaQty)return null;return(p.taQty*p.exitTaPrice+p.tbQty*p.exitTbPrice)-(p.exitTaQty*p.exitTaPrice+p.exitTbQty*p.exitTbPrice);}
const isPending=p=>p.rewards.some(r=>r.state==='pendiente');
const usd=v=>(v>=0?'':'−')+'$'+Math.abs(v).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});
const pctFmt=v=>(v>=0?'+':'')+v.toFixed(2)+'%';
function qtyFmt(v){if(Math.abs(v)>=1000)return v.toLocaleString('es-ES',{maximumFractionDigits:2});if(Math.abs(v)>=1)return v.toLocaleString('es-ES',{maximumFractionDigits:4});return v.toLocaleString('es-ES',{maximumFractionDigits:8});}
function wTag(wId){const w=WALLETS[wId];return`<span class="wtag-inline" style="background:${w.color}22;color:${w.color}"><span style="width:7px;height:7px;border-radius:50%;background:${w.color};display:inline-block"></span>${w.label}</span>`;}
function defiQtyForWallet(sym,wId){const s=sym.toUpperCase();let t=0;db.positions.filter(p=>p.status==='active'&&p.wallet===wId).forEach(p=>{if(p.taSymbol.toUpperCase()===s)t+=p.taQty;if(p.tbSymbol.toUpperCase()===s)t+=p.tbQty;});return t;}

function drawDonut(id,segs,total){const canvas=document.getElementById(id);if(!canvas)return;const ctx=canvas.getContext('2d');const sz=canvas.width,cx=sz/2,cy=sz/2,outerR=sz/2-3,innerR=outerR*0.60;ctx.clearRect(0,0,sz,sz);if(!segs.length||total===0){ctx.beginPath();ctx.arc(cx,cy,outerR,0,Math.PI*2);ctx.strokeStyle='rgba(128,128,128,0.12)';ctx.lineWidth=outerR-innerR;ctx.stroke();return;}let startAngle=-Math.PI/2;const GAP=segs.length>1?0.025:0;segs.forEach(seg=>{if(seg.value<=0)return;const sliceAngle=(seg.value/total)*Math.PI*2-GAP;ctx.beginPath();ctx.arc(cx,cy,outerR,startAngle+GAP/2,startAngle+GAP/2+sliceAngle);ctx.arc(cx,cy,innerR,startAngle+GAP/2+sliceAngle,startAngle+GAP/2,true);ctx.closePath();ctx.fillStyle=seg.color;ctx.fill();startAngle+=(seg.value/total)*Math.PI*2;});}

function showView(name){['portfolio','positions','detail','global'].forEach(v=>document.getElementById('view-'+v).classList.remove('active'));['portfolio','positions','global'].forEach(v=>{const el=document.getElementById('nav-'+v);if(el)el.classList.remove('active');});document.getElementById('view-'+name).classList.add('active');if(name!=='detail'){const el=document.getElementById('nav-'+name);if(el)el.classList.add('active');}const nb=document.getElementById('nav-new');if(name==='portfolio'){nb.textContent='+ Activo';nb.style.display='';}else if(name==='positions'){nb.textContent='+ Nueva posición';nb.style.display='';}else{nb.style.display='none';}if(name==='portfolio')renderPortfolio();if(name==='positions'){renderFilter();renderPositions();}if(name==='global')renderGlobal();if(name==='detail')renderDetail();}
function handleNew(){const cur=document.querySelector('.nav-btn.active')?.id;if(cur==='nav-portfolio')openAssetModal();else openNewPos();}
function backFromDetail(){showView(prevView);}
function goDetail(id){activeDetail=id;const cur=document.querySelector('.nav-btn.active')?.id;prevView=cur==='nav-portfolio'?'portfolio':cur==='nav-global'?'global':'positions';showView('detail');}
function setWalletTab(wId){activeWalletTab=wId;renderPortfolio();}

function renderPortfolio(){
  const el=document.getElementById('portfolio-content');
  const wTotals={};Object.keys(WALLETS).forEach(wId=>{wTotals[wId]=db.assets.filter(a=>a.wallet===wId).reduce((s,a)=>s+a.qty*a.price,0);});
  const grand=Object.values(wTotals).reduce((s,v)=>s+v,0);
  const tabs=Object.entries(WALLETS).map(([wId,w])=>{const isA=activeWalletTab===wId;return`<button class="wallet-tab ${isA?'active':''}" onclick="setWalletTab('${wId}')" style="${isA?`border-color:${w.color};`:''}"><div style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:50%;background:${w.color};display:inline-block"></span><span style="font-size:14px;font-weight:500">${w.label}</span><span class="wtag ${w.type==='personal'?'tag-solo':'tag-shared'}">${w.type}</span></div><div class="wallet-tab-total" style="color:${w.color}">${usd(wTotals[wId]||0)}</div></button>`;}).join('');
  const wAssets=db.assets.filter(a=>a.wallet===activeWalletTab);
  const wTotal=wTotals[activeWalletTab]||0;
  if(!wAssets.length){el.innerHTML=`<div style="margin-bottom:10px;font-size:13px;color:var(--text2)">Portfolio total: <strong style="font-size:16px">${usd(grand)}</strong></div><div class="wallet-tabs">${tabs}</div><div class="empty-state">Sin activos en esta wallet.<br>Añade tu primer activo con "+ Activo".</div>`;return;}
  const segs1=wAssets.map((a,i)=>({value:a.qty*a.price,color:ASSET_COLORS[i%ASSET_COLORS.length],label:a.symbol}));
  const segs2=[];wAssets.forEach((a,i)=>{const bc=ASSET_COLORS[i%ASSET_COLORS.length],dq=defiQtyForWallet(a.symbol,activeWalletTab),hq=Math.max(0,a.qty-dq),hv=hq*a.price,dv=dq*a.price;if(hv>0)segs2.push({value:hv,color:hodlColor(bc),label:`${a.symbol} HODL`});if(dv>0)segs2.push({value:dv,color:bc,label:`${a.symbol} DeFi`});});
  const totalDefi=wAssets.reduce((s,a)=>s+defiQtyForWallet(a.symbol,activeWalletTab)*a.price,0),totalHodl=wTotal-totalDefi;
  const leg2=[];wAssets.forEach((a,i)=>{const bc=ASSET_COLORS[i%ASSET_COLORS.length],dq=defiQtyForWallet(a.symbol,activeWalletTab),hq=Math.max(0,a.qty-dq),hv=hq*a.price,dv=dq*a.price;if(hv>0)leg2.push({color:hodlColor(bc),label:`${a.symbol} HODL`,value:hv});if(dv>0)leg2.push({color:bc,label:`${a.symbol} DeFi`,value:dv});});
  const rows=wAssets.map((a,i)=>{const bc=ASSET_COLORS[i%ASSET_COLORS.length],dq=defiQtyForWallet(a.symbol,activeWalletTab),hq=Math.max(0,a.qty-dq),tv=a.qty*a.price,hp=a.qty>0?hq/a.qty*100:100,dp=a.qty>0?dq/a.qty*100:0,pnlH=a.buyPrice?(a.price-a.buyPrice)*a.qty:null,roiH=a.buyPrice&&a.buyPrice>0?(a.price-a.buyPrice)/a.buyPrice*100:null;return`<tr><td><div style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:50%;background:${bc};display:inline-block;flex-shrink:0"></span><div><div class="asset-sym">${a.symbol}</div><div class="asset-name-s">${a.name||''}</div></div></div></td><td><div>${qtyFmt(a.qty)}</div><div style="font-size:11px;color:var(--text3)">${usd(tv)}</div></td><td><div>${usd(a.price)}</div>${a.buyPrice?`<div style="font-size:11px;color:var(--text3)">Compra: ${usd(a.buyPrice)}</div>`:''}</td><td>${pnlH!==null?`<div class="${pnlH>=0?'pnl-pos':'pnl-neg'}">${usd(pnlH)}</div><div style="font-size:11px;color:var(--text3)">${pctFmt(roiH)}</div>`:'<span style="color:var(--text3)">—</span>'}</td><td><div class="seg-mini"><div style="width:${hp}%;background:${hodlColor(bc)};height:100%;border-radius:2px"></div><div style="width:${dp}%;background:${bc};height:100%;border-radius:2px"></div></div><div style="font-size:11px;color:var(--text3);margin-top:3px">${qtyFmt(hq)} / ${qtyFmt(dq)}</div></td><td><button class="btn-icon-e" onclick="openEditAsset('${a.id}')">✎</button><button class="btn-icon" onclick="delAsset('${a.id}')">✕</button></td></tr>`;}).join('');
  el.innerHTML=`<div style="margin-bottom:10px;font-size:13px;color:var(--text2)">Portfolio total: <strong style="font-size:16px">${usd(grand)}</strong></div><div class="wallet-tabs">${tabs}</div>
  <div class="donuts-row">
    <div class="donut-card"><div class="donut-card-title">Composición por activo</div><div class="donut-inner"><div class="donut-wrap" style="width:150px;height:150px"><canvas id="donut1" width="150" height="150"></canvas><div class="donut-center" style="width:70px"><div class="donut-center-val">${usd(wTotal)}</div><div class="donut-center-lbl">total</div></div></div><div class="donut-legend">${segs1.map(s=>`<div class="legend-row"><div class="legend-dot" style="background:${s.color}"></div><span class="legend-name">${s.label}</span><span class="legend-pct">${wTotal>0?(s.value/wTotal*100).toFixed(1):0}%</span></div>`).join('')}</div></div></div>
    <div class="donut-card"><div class="donut-card-title">HODL vs DeFi por activo</div><div class="donut-inner"><div class="donut-wrap" style="width:150px;height:150px"><canvas id="donut2" width="150" height="150"></canvas><div class="donut-center" style="width:70px"><div class="donut-center-val">${wTotal>0?(totalDefi/wTotal*100).toFixed(1):0}%</div><div class="donut-center-lbl">en DeFi</div></div></div><div class="donut-legend"><div class="legend-row" style="margin-bottom:2px"><div class="legend-dot" style="background:var(--text3);opacity:.4"></div><span class="legend-name" style="color:var(--text2);font-size:11px">HODL ${usd(totalHodl)}</span><span class="legend-pct">${wTotal>0?(totalHodl/wTotal*100).toFixed(1):0}%</span></div><div class="legend-row" style="margin-bottom:6px"><div class="legend-dot" style="background:var(--text2)"></div><span class="legend-name" style="color:var(--text2);font-size:11px">DeFi ${usd(totalDefi)}</span><span class="legend-pct">${wTotal>0?(totalDefi/wTotal*100).toFixed(1):0}%</span></div><div class="legend-sep"></div>${leg2.map(s=>`<div class="legend-row"><div class="legend-dot" style="background:${s.color}"></div><span class="legend-name">${s.label}</span><span class="legend-pct">${wTotal>0?(s.value/wTotal*100).toFixed(1):0}%</span></div>`).join('')}</div></div></div>
  </div>
  <div class="card-box"><table class="asset-table"><thead><tr><th>Activo</th><th>Cantidad</th><th>Precio</th><th>P&L HODL</th><th>HODL / DeFi</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  requestAnimationFrame(()=>{drawDonut('donut1',segs1,wTotal);drawDonut('donut2',segs2,wTotal);});
}

function renderFilter(){const el=document.getElementById('wallet-filter');const all=`<button class="wallet-pill ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">Todas las wallets</button>`;const pills=Object.entries(WALLETS).map(([id,w])=>{const cnt=db.positions.filter(p=>p.wallet===id).length;const t=w.type==='personal'?`<span class="wtag tag-solo">personal</span>`:`<span class="wtag tag-shared">compartida</span>`;return`<button class="wallet-pill ${activeFilter===id?'active':''}" onclick="setFilter('${id}')"><span class="wallet-dot" style="background:${w.color}"></span>${w.label}${t}<span style="font-size:12px;color:var(--text3)">${cnt}</span></button>`;}).join('');el.innerHTML=all+pills;}
function setFilter(id){activeFilter=id;renderFilter();renderPositions();}

function renderPositions(){const el=document.getElementById('pos-list');const list=activeFilter==='all'?db.positions:db.positions.filter(p=>p.wallet===activeFilter);if(!list.length){el.innerHTML='<div class="empty-state">Sin posiciones DeFi.<br>Crea tu primera con "+ Nueva posición".</div>';return;}el.innerHTML=list.map(p=>{const c=cap(p),pl=pnl(p),r=roi(p),cv=p.status==='active'?(p.curVal||c):exitVal(p);let cls='pos-card ',bCls='',bLbl='';if(p.status==='active'&&isPending(p)){cls+='is-pending';bCls='badge-pending';bLbl='Rewards pendientes';}else if(p.status==='active'){cls+='is-active';bCls='badge-active';bLbl='Activa';}else{cls+='is-closed';bCls='badge-closed';bLbl='Cerrada';}return`<div class="${cls}" onclick="goDetail(${p.id})"><div class="pos-head"><span class="badge ${bCls}">${bLbl}</span><span class="pos-pair">${p.taSymbol}/${p.tbSymbol}</span><span class="pos-proto">${p.protocol} · ${p.network}</span>${wTag(p.wallet)}</div><div class="pos-stats"><div><div class="stat-label">Capital</div><div class="stat-value">${usd(c)}</div></div><div><div class="stat-label">${p.status==='active'?'Valor actual':'Valor salida'}</div><div class="stat-value">${usd(cv)}</div></div><div><div class="stat-label">P&L neta</div><div class="stat-value ${pl>=0?'pos':'neg'}">${usd(pl)}</div></div><div><div class="stat-label">ROI / APY</div><div class="stat-value ${r>=0?'pos':'neg'}">${pctFmt(r)} / ${pctFmt(apy(p))}</div></div></div></div>`;}).join('');}

function renderDetail(){const p=db.positions.find(x=>x.id===activeDetail);if(!p){document.getElementById('detail-content').innerHTML='<div class="empty-state">No encontrada.</div>';return;}const c=cap(p),taU=p.taQty*p.taPrice,tbU=p.tbQty*p.tbPrice,taPct=(taU/c*100).toFixed(1),tbPct=(tbU/c*100).toFixed(1),pl=pnl(p),r=roi(p),ap=apy(p),rw=rewTotal(p),d=days(p);const priceG=p.status==='active'?(p.curVal||c)-c:exitVal(p)-c,feesG=p.fees||0,rewG=rw,tot=Math.abs(priceG)+feesG+rewG||1;const pw=(Math.abs(priceG)/tot*100).toFixed(0),fw=(feesG/tot*100).toFixed(0),rw2=(rewG/tot*100).toFixed(0);const w=WALLETS[p.wallet];const rewHTML=p.rewards.length?`<table class="rewards-table" style="width:100%"><tr><th>Fecha</th><th>Importe</th><th>Estado</th><th style="width:70px"></th></tr>${p.rewards.map(r=>`<tr><td>${r.date}</td><td>${usd(r.usd)}</td><td><span class="rs ${r.state==='reinvertido'?'rs-reinv':r.state==='retirado'?'rs-ret':'rs-pend'}">${r.state}</span></td><td style="text-align:right"><button class="btn-icon-e" onclick="openEditReward(${p.id},${r.id})">✎</button><button class="btn-icon" onclick="delReward(${p.id},${r.id})">✕</button></td></tr>`).join('')}</table>`:'<div style="font-size:14px;color:var(--text3);padding:8px 0">Sin rewards registrados</div>';let rebalHTML='';if(p.status==='closed'&&p.exitTaQty){const ev=exitVal(p),etaU=p.exitTaQty*p.exitTaPrice,etbU=p.exitTbQty*p.exitTbPrice,etaP=ev>0?(etaU/ev*100).toFixed(1):0,etbP=ev>0?(etbU/ev*100).toFixed(1):0,dA=(ev*(parseFloat(taPct)/100))-etaU,dB=(ev*(parseFloat(tbPct)/100))-etbU,ilv=il(p);rebalHTML=`<div class="sec-title" style="margin-top:24px">Reequilibrio post-salida</div><div style="background:var(--bg2);border-radius:8px;padding:14px 16px;margin-bottom:14px">${[{s:p.taSymbol,ep:taPct,xp:etaP,d:dA},{s:p.tbSymbol,ep:tbPct,xp:etbP,d:dB}].map(x=>`<div class="rebal-row"><span class="rebal-tok">${x.s}</span><span class="rebal-pcts">Entrada ${x.ep}% → Salida ${x.xp}%</span><span class="rebal-action ${Math.abs(x.d)>5?(x.d>0?'buy':'sell'):'ok'}">${Math.abs(x.d)>5?(x.d>0?'▲ Comprar ':'▼ Vender ')+usd(Math.abs(x.d)):'≈ Equilibrado'}</span></div>`).join('')}${ilv!==null?`<div style="padding-top:10px;font-size:13px;color:var(--text2)">IL estimado: <strong style="color:var(--danger)">${usd(ilv)}</strong></div>`:''}</div>`;}const actions=p.status==='active'?`<div class="action-bar"><button class="btn-act btn-act-ghost" onclick="openNewReward(${p.id})">+ Reward</button><button class="btn-act btn-act-ghost" onclick="openEditPos(${p.id})">✎ Editar</button><button class="btn-act btn-act-primary" onclick="openClose(${p.id})">Cerrar posición →</button><button class="btn-act btn-act-danger" onclick="openDelete(${p.id})">Eliminar</button></div><div class="action-hint">"Cerrar posición" guarda en historial y devuelve tokens a HODL · "Eliminar" borra sin rastro</div>`:`<div class="action-bar"><button class="btn-act btn-act-ghost" onclick="openEditPos(${p.id})">✎ Editar datos</button><span style="font-size:13px;color:var(--text3)">Cerrada el ${p.dateOut}</span><button class="btn-act btn-act-danger" onclick="openDelete(${p.id})">Eliminar del historial</button></div>`;document.getElementById('detail-content').innerHTML=`<div class="detail-header"><div><div class="detail-pair">${p.taSymbol}/${p.tbSymbol}</div><div class="detail-meta">${p.protocol} · ${p.network} · ${d} días ${wTag(p.wallet)} <span class="wtag ${w.type==='personal'?'tag-solo':'tag-shared'}">${w.type}</span></div></div><span class="badge ${isPending(p)?'badge-pending':p.status==='active'?'badge-active':'badge-closed'}" style="font-size:13px;padding:6px 14px">${isPending(p)?'Rewards pendientes':p.status==='active'?'Activa':'Cerrada'}</span></div><div class="detail-grid-3"><div class="dc"><div class="dc-label">P&L neta</div><div class="dc-value" style="color:${pl>=0?'var(--success)':'var(--danger)'}">${usd(pl)}</div></div><div class="dc"><div class="dc-label">ROI total</div><div class="dc-value" style="color:${r>=0?'var(--success)':'var(--danger)'}">${pctFmt(r)}</div></div><div class="dc"><div class="dc-label">APY realizado</div><div class="dc-value" style="color:${ap>=0?'var(--success)':'var(--danger)'}">${pctFmt(ap)}</div></div></div><div class="sec-title">Entrada</div><div class="card-box"><div style="font-size:13px;color:var(--text2);margin-bottom:12px">Capital: <strong>${usd(c)}</strong> · ${p.dateIn}</div>${[{s:p.taSymbol,q:p.taQty,pr:p.taPrice,u:taU,pc:taPct},{s:p.tbSymbol,q:p.tbQty,pr:p.tbPrice,u:tbU,pc:tbPct}].map(t=>`<div class="token-row"><span class="tok-sym">${t.s}</span><span class="tok-detail">${qtyFmt(t.q)} × ${usd(t.pr)}</span><div><div class="tok-usd">${usd(t.u)}</div><div class="tok-pct">${t.pc}%</div></div></div>`).join('')}</div>${p.status==='active'?`<div class="sec-title" style="margin-top:24px">Seguimiento actual</div><div class="detail-grid-3"><div class="dc"><div class="dc-label">Valor actual</div><div class="dc-value">${usd(p.curVal||c)}</div></div><div class="dc"><div class="dc-label">Fees acumuladas</div><div class="dc-value">${usd(p.fees||0)}</div></div><div class="dc"><div class="dc-label">Rewards totales</div><div class="dc-value">${usd(rw)}</div></div></div>`:`<div class="sec-title" style="margin-top:24px">Salida · ${p.dateOut}</div><div class="card-box" style="margin-bottom:16px"><div style="font-size:13px;color:var(--text2);margin-bottom:12px">Valor retirado: <strong>${usd(exitVal(p))}</strong></div>${p.exitTaQty?[{s:p.taSymbol,q:p.exitTaQty,pr:p.exitTaPrice},{s:p.tbSymbol,q:p.exitTbQty,pr:p.exitTbPrice}].map(t=>`<div class="token-row"><span class="tok-sym">${t.s}</span><span class="tok-detail">${qtyFmt(t.q)} × ${usd(t.pr)}</span><div><div class="tok-usd">${usd(t.q*t.pr)}</div></div></div>`).join(''):''}</div>`}<div class="sec-title">Desglose de rendimiento</div><div style="background:var(--bg2);border-radius:8px;padding:14px 18px;margin-bottom:16px"><div class="breakdown-bar"><div class="bar-seg" style="width:${pw}%;background:${priceG>=0?'#1D9E75':'#D85A30'}"></div><div class="bar-seg" style="width:${fw}%;background:#378ADD"></div><div class="bar-seg" style="width:${rw2}%;background:#BA7517"></div></div><div class="bleg"><div class="bleg-item"><div class="bleg-dot" style="background:${priceG>=0?'#1D9E75':'#D85A30'}"></div>Precio: ${usd(priceG)}</div><div class="bleg-item"><div class="bleg-dot" style="background:#378ADD"></div>Fees: ${usd(feesG)}</div><div class="bleg-item"><div class="bleg-dot" style="background:#BA7517"></div>Rewards: ${usd(rewG)}</div></div></div><div class="sec-header"><div class="sec-title">Rewards reclamados</div>${p.status==='active'?`<button class="btn-sm" onclick="openNewReward(${p.id})">+ Añadir reward</button>`:''}</div><div class="card-box">${rewHTML}</div>${rebalHTML}${actions}`;}

function renderGlobal(){const pos=db.positions,tCap=pos.reduce((s,p)=>s+cap(p),0),tPnL=pos.reduce((s,p)=>s+pnl(p),0),tRew=pos.reduce((s,p)=>s+rewTotal(p),0),totPort=db.assets.reduce((s,a)=>s+a.qty*a.price,0),totPnLHodl=db.assets.reduce((s,a)=>a.buyPrice?(s+(a.price-a.buyPrice)*a.qty):s,0),ranked=[...pos].sort((a,b)=>roi(b)-roi(a)),pend=pos.filter(p=>p.status==='active'&&isPending(p));const wCards=Object.entries(WALLETS).map(([id,w])=>{const wP=pos.filter(p=>p.wallet===id),wC=wP.reduce((s,p)=>s+cap(p),0),wPL=wP.reduce((s,p)=>s+pnl(p),0),wR=wC>0?wPL/wC*100:0,wHodl=db.assets.filter(a=>a.wallet===id).reduce((s,a)=>s+a.qty*a.price,0);return`<div class="card-box" style="border-left:4px solid ${w.color}"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><span class="wallet-dot" style="background:${w.color}"></span><span style="font-size:15px;font-weight:500">${w.label}</span><span class="wtag ${w.type==='personal'?'tag-solo':'tag-shared'}">${w.type}</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px"><div><div style="font-size:12px;color:var(--text2);margin-bottom:2px">HODL</div><div style="font-size:16px;font-weight:500;color:#378ADD">${usd(wHodl)}</div></div><div><div style="font-size:12px;color:var(--text2);margin-bottom:2px">DeFi</div><div style="font-size:16px;font-weight:500;color:#BA7517">${usd(wC)}</div></div></div><div style="display:flex;gap:14px;font-size:13px"><div><span style="color:var(--text3)">P&L DeFi </span><strong style="color:${wPL>=0?'var(--success)':'var(--danger)'}">${usd(wPL)}</strong></div><div><span style="color:var(--text3)">ROI </span><strong style="color:${wR>=0?'var(--success)':'var(--danger)'}">${pctFmt(wR)}</strong></div><div><span style="color:var(--text3)">Activas </span><strong>${wP.filter(p=>p.status==='active').length}</strong></div></div></div>`;}).join('');document.getElementById('global-content').innerHTML=`<div class="metric-grid" style="grid-template-columns:repeat(4,minmax(0,1fr))"><div class="metric-card"><div class="metric-label">Portfolio total</div><div class="metric-value">${usd(totPort)}</div><div class="metric-sub">HODL + DeFi</div></div><div class="metric-card"><div class="metric-label">P&L HODL</div><div class="metric-value ${totPnLHodl>=0?'positive':'negative'}">${usd(totPnLHodl)}</div></div><div class="metric-card"><div class="metric-label">P&L DeFi total</div><div class="metric-value ${tPnL>=0?'positive':'negative'}">${usd(tPnL)}</div></div><div class="metric-card"><div class="metric-label">Rewards totales</div><div class="metric-value positive">${usd(tRew)}</div></div></div><div class="sec-title">Por wallet</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px">${wCards}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div class="card-box"><div style="font-size:15px;font-weight:500;margin-bottom:14px">Ranking por ROI</div>${ranked.length?ranked.map((p,i)=>{const w=WALLETS[p.wallet];return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer" onclick="goDetail(${p.id})"><span style="font-size:13px;color:var(--text3);min-width:20px">${i+1}</span><span style="font-size:14px;flex:1">${p.taSymbol}/${p.tbSymbol} <span style="font-size:12px;color:var(--text3)">${p.protocol}</span><span style="width:7px;height:7px;border-radius:50%;background:${w.color};display:inline-block;margin-left:3px"></span>${p.status==='closed'?'<span style="font-size:11px;color:var(--text3)"> · cerrada</span>':''}</span><span style="font-size:14px;font-weight:500;color:${roi(p)>=0?'var(--success)':'var(--danger)'}">${pctFmt(roi(p))}</span></div>`;}).join(''):'<div class="empty-state" style="padding:24px 0">Sin posiciones</div>'}</div><div class="card-box"><div style="font-size:15px;font-weight:500;margin-bottom:14px">Alertas</div>${pend.length?pend.map(p=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer" onclick="goDetail(${p.id})"><span style="font-size:16px;color:var(--warning)">⚠</span><span style="font-size:14px;flex:1">${p.taSymbol}/${p.tbSymbol} · ${WALLETS[p.wallet].label}</span><span class="rs rs-pend">pendiente</span></div>`).join(''):'<div style="font-size:14px;color:var(--text3);padding:10px 0">Sin alertas</div>'}</div></div>`;}

function openAssetModal(){editingAssetId=null;document.getElementById('masset-title').textContent='Añadir activo';['a-symbol','a-name','a-qty','a-price','a-buy-price','a-buy-date'].forEach(id=>document.getElementById(id).value='');document.getElementById('a-wallet').value=activeWalletTab;document.getElementById('modal-asset').classList.add('open');}
function openEditAsset(id){const a=db.assets.find(x=>x.id===id);if(!a)return;editingAssetId=id;document.getElementById('masset-title').textContent='Editar activo';document.getElementById('a-wallet').value=a.wallet||'koke';document.getElementById('a-symbol').value=a.symbol;document.getElementById('a-name').value=a.name||'';document.getElementById('a-qty').value=a.qty;document.getElementById('a-price').value=a.price;document.getElementById('a-buy-price').value=a.buyPrice||'';document.getElementById('a-buy-date').value=a.buyDate||'';document.getElementById('modal-asset').classList.add('open');}
function saveAsset(){const sym=(document.getElementById('a-symbol').value||'').toUpperCase().trim();if(!sym)return;const d={wallet:document.getElementById('a-wallet').value,symbol:sym,name:document.getElementById('a-name').value||'',qty:parseFloat(document.getElementById('a-qty').value)||0,price:parseFloat(document.getElementById('a-price').value)||0,buyPrice:parseFloat(document.getElementById('a-buy-price').value)||null,buyDate:document.getElementById('a-buy-date').value||null};if(editingAssetId){const a=db.assets.find(x=>x.id===editingAssetId);if(!a)return;Object.assign(a,d);}else db.assets.push({id:'a'+Date.now(),...d});persist();document.getElementById('modal-asset').classList.remove('open');renderPortfolio();}
function delAsset(id){if(!confirm('¿Eliminar este activo?'))return;db.assets=db.assets.filter(a=>a.id!==id);persist();renderPortfolio();}

function openNewPos(){editingPosId=null;document.getElementById('mpos-title').textContent='Nueva posición DeFi';document.getElementById('mpos-desc').textContent='Los tokens se descontarán del HODL de la misma wallet automáticamente.';document.getElementById('mpos-btn').textContent='Guardar';document.getElementById('f-track-section').style.display='none';['f-protocol','f-network','f-ta-sym','f-tb-sym','f-ta-qty','f-ta-price','f-tb-qty','f-tb-price','f-cur-val','f-fees'].forEach(id=>document.getElementById(id).value='');document.getElementById('f-wallet').value='koke';document.getElementById('f-date-in').value=new Date().toISOString().split('T')[0];document.getElementById('modal-pos').classList.add('open');}
function openEditPos(id){const p=db.positions.find(x=>x.id===id);if(!p)return;editingPosId=id;document.getElementById('mpos-title').textContent='Editar posición DeFi';document.getElementById('mpos-desc').textContent='Modifica cualquier dato y guarda los cambios.';document.getElementById('mpos-btn').textContent='Guardar cambios';document.getElementById('f-wallet').value=p.wallet;document.getElementById('f-protocol').value=p.protocol;document.getElementById('f-network').value=p.network;document.getElementById('f-ta-sym').value=p.taSymbol;document.getElementById('f-tb-sym').value=p.tbSymbol;document.getElementById('f-ta-qty').value=p.taQty;document.getElementById('f-ta-price').value=p.taPrice;document.getElementById('f-tb-qty').value=p.tbQty;document.getElementById('f-tb-price').value=p.tbPrice;document.getElementById('f-date-in').value=p.dateIn;if(p.status==='active'){document.getElementById('f-track-section').style.display='block';document.getElementById('f-cur-val').value=p.curVal||'';document.getElementById('f-fees').value=p.fees||'';}else document.getElementById('f-track-section').style.display='none';document.getElementById('modal-pos').classList.add('open');}
function savePos(){const d={wallet:document.getElementById('f-wallet').value,protocol:document.getElementById('f-protocol').value||'Sin protocolo',network:document.getElementById('f-network').value||'',taSymbol:(document.getElementById('f-ta-sym').value||'A').toUpperCase(),tbSymbol:(document.getElementById('f-tb-sym').value||'B').toUpperCase(),taQty:parseFloat(document.getElementById('f-ta-qty').value)||0,taPrice:parseFloat(document.getElementById('f-ta-price').value)||0,tbQty:parseFloat(document.getElementById('f-tb-qty').value)||0,tbPrice:parseFloat(document.getElementById('f-tb-price').value)||0,dateIn:document.getElementById('f-date-in').value||new Date().toISOString().split('T')[0]};if(editingPosId!==null){const p=db.positions.find(x=>x.id===editingPosId);if(!p)return;Object.assign(p,d);if(p.status==='active'){p.curVal=parseFloat(document.getElementById('f-cur-val').value)||p.curVal;p.fees=parseFloat(document.getElementById('f-fees').value)||0;}persist();document.getElementById('modal-pos').classList.remove('open');renderDetail();}else{const p={id:Date.now(),...d,status:'active',curVal:d.taQty*d.taPrice+d.tbQty*d.tbPrice,fees:0,rewards:[]};db.positions.unshift(p);persist();document.getElementById('modal-pos').classList.remove('open');renderPositions();}}

function openNewReward(posId){rewardTarget={posId,rewardId:null};document.getElementById('mrew-title').textContent='Registrar reward';document.getElementById('mrew-btn').textContent='Guardar';document.getElementById('r-usd').value='';document.getElementById('r-date').value=new Date().toISOString().split('T')[0];document.getElementById('r-state').value='reinvertido';document.getElementById('modal-reward').classList.add('open');}
function openEditReward(posId,rId){rewardTarget={posId,rewardId:rId};const p=db.positions.find(x=>x.id===posId);if(!p)return;const r=p.rewards.find(x=>x.id===rId);if(!r)return;document.getElementById('mrew-title').textContent='Editar reward';document.getElementById('mrew-btn').textContent='Guardar cambios';document.getElementById('r-usd').value=r.usd;document.getElementById('r-date').value=r.date;document.getElementById('r-state').value=r.state;document.getElementById('modal-reward').classList.add('open');}
function saveReward(){const{posId,rewardId}=rewardTarget;const p=db.positions.find(x=>x.id===posId);if(!p)return;const val={usd:parseFloat(document.getElementById('r-usd').value)||0,date:document.getElementById('r-date').value,state:document.getElementById('r-state').value};if(rewardId){const r=p.rewards.find(x=>x.id===rewardId);if(r)Object.assign(r,val);}else p.rewards.push({id:Date.now(),...val});persist();document.getElementById('modal-reward').classList.remove('open');renderDetail();}
function delReward(posId,rId){const p=db.positions.find(x=>x.id===posId);if(!p)return;p.rewards=p.rewards.filter(r=>r.id!==rId);persist();renderDetail();}

function openClose(id){closeTarget=id;const p=db.positions.find(x=>x.id===id);document.getElementById('cl-la').textContent='Cantidad '+p.taSymbol+' retirada';document.getElementById('cl-lb').textContent='Cantidad '+p.tbSymbol+' retirada';document.getElementById('cl-pa').textContent='Precio '+p.taSymbol;document.getElementById('cl-pb').textContent='Precio '+p.tbSymbol;document.getElementById('cl-date').value=new Date().toISOString().split('T')[0];['cl-ta-qty','cl-tb-qty','cl-ta-price','cl-tb-price','cl-fees'].forEach(id=>document.getElementById(id).value='');document.getElementById('modal-close').classList.add('open');}
function saveClose(){const p=db.positions.find(x=>x.id===closeTarget);if(!p)return;p.status='closed';p.exitTaQty=parseFloat(document.getElementById('cl-ta-qty').value)||0;p.exitTbQty=parseFloat(document.getElementById('cl-tb-qty').value)||0;p.exitTaPrice=parseFloat(document.getElementById('cl-ta-price').value)||p.taPrice;p.exitTbPrice=parseFloat(document.getElementById('cl-tb-price').value)||p.tbPrice;p.fees=parseFloat(document.getElementById('cl-fees').value)||0;p.dateOut=document.getElementById('cl-date').value;p.curVal=null;persist();document.getElementById('modal-close').classList.remove('open');renderDetail();}
function openDelete(id){deleteTarget=id;document.getElementById('modal-delete').classList.add('open');}
function confirmDelete(){db.positions=db.positions.filter(p=>p.id!==deleteTarget);persist();document.getElementById('modal-delete').classList.remove('open');showView('positions');}

load();renderFilter();renderPositions();
</script>
</body>
